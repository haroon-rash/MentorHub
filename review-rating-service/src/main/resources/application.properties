spring.application.name=review-rating-service
server.port=${SERVER_PORT:8090}
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mentorhub}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3005}
app.services.ai-sentiment-url=${AI_SENTIMENT_SERVICE_URL:http://localhost:8093}
app.services.tutor-service-url=${TUTOR_SERVICE_URL:http://localhost:8087}
app.services.notification-service-url=${NOTIFICATION_SERVICE_URL:http://localhost:8091}
app.services.recommendation-service-url=${RECOMMENDATION_SERVICE_URL:http://localhost:8000}
