name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  frontend:
    name: Frontend Lint Test Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  auth-service:
    name: Auth Service Build
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_AUTH_SERVICE_CI == 'true' }}
    defaults:
      run:
        working-directory: Authentication-Service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build
        run: ./mvnw -q -DskipTests package
