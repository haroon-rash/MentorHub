spring.application.name=authentication-service
server.port=${SERVER_PORT:5006}

# --- Database ---
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/mentorhub}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# --- SMTP / Mail ---
spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.connectiontimeout=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_CONNECTIONTIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_WRITETIMEOUT:5000}

# OTP
app.otp.expiry-minutes=${APP_OTP_EXPIRY_MINUTES:10}
app.otp.code-length=${APP_OTP_CODE_LENGTH:6}
app.otp.send-email=${APP_OTP_SEND_EMAIL:true}
app.mail.from=${APP_MAIL_FROM:no-reply@mentorhub.local}

# JWT PROVIDER
# 3 days (259200000 ms) for access, refresh, and password-reset JWTs
security.jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:259200000}
security.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:259200000}
jwt.private-key-path=${JWT_PRIVATE_KEY_PATH:classpath:keys/private_key.pem}

# Platform integration
app.services.usermanagment-url=${APP_SERVICES_USERMANAGMENT_URL:http://usermanagment-api:8085}
app.internal-api.key=${APP_INTERNAL_API_KEY:mentorhub-docker-internal-key}
app.security.internal-api-key=${APP_SECURITY_INTERNAL_API_KEY:${APP_INTERNAL_API_KEY:mentorhub-docker-internal-key}}

# Security
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3005}
app.security.super-admin-email=${APP_SECURITY_SUPER_ADMIN_EMAIL:haroonurrasheed1212@gmail.com}
app.security.super-admin-password=${APP_SECURITY_SUPER_ADMIN_PASSWORD:admin}
app.security.admin-otp-email=${APP_SECURITY_ADMIN_OTP_EMAIL:haroonurrasheed1212@gmail.com}
app.security.password-reset-token-ms=${APP_SECURITY_PASSWORD_RESET_TOKEN_MS:259200000}

# Google OAuth2 config
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:5006/api/v1/auth/oauth/success}
spring.security.oauth2.client.registration.google.client-name=Google

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://openidconnect.googleapis.com/v1/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub
