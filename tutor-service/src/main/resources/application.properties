spring.application.name=tutor-service
server.port=${SERVER_PORT:8087}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mentorhub}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3005}

# Shared secret used by sibling services (e.g. UserManagment.API) when calling /api/internal/**
# Must be set in production. When blank, all internal endpoints fail closed.
app.internal-api.key=${INTERNAL_API_KEY:}

# When true, requires the API gateway to mark the request as verified
# (X-MentorHub-Gateway-Auth: verified) before any caller-supplied X-Auth-User-Id /
# X-User-Role identity headers are honoured. Always true in production.
app.security.require-gateway-trust=${APP_SECURITY_REQUIRE_GATEWAY_TRUST:false}
